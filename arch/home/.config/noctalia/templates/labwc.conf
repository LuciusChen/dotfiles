# Match Noctalia's translucent surface bar. Focus is shown with a restrained
# accent outline instead of changing the whole titlebar color.
border.width: 1
window.active.border.color: {{colors.primary.default.hex}}73
window.inactive.border.color: {{colors.outline_variant.default.hex}}33
window.active.indicator.toggled-keybind.color: {{colors.error.default.hex}}

window.titlebar.padding.width: 2
window.titlebar.padding.height: 1
window.active.title.bg.color: {{colors.surface.default.hex}}c7
window.inactive.title.bg.color: {{colors.surface.default.hex}}c7
window.*.title.bg: Solid

window.active.label.text.color: {{colors.on_surface.default.hex}}
window.inactive.label.text.color: {{colors.on_surface_variant.default.hex}}
window.label.text.justify: center

window.button.width: 21
window.button.height: 21
window.button.spacing: 3
# Base glyphs come from labwc-adwaita, but Labwc draws the hover surface so it
# follows Noctalia instead of using the fixed Adwaita hover artwork.
window.button.hover.bg.color: {{colors.on_surface.default.hex}}1f
window.button.hover.bg.corner-radius: 11
window.active.button.unpressed.image.color: {{colors.on_surface.default.hex}}
window.inactive.button.unpressed.image.color: {{colors.on_surface_variant.default.hex}}

menu.border.color: {{colors.outline_variant.default.hex}}
menu.items.bg.color: {{colors.surface_container.default.hex}}
menu.items.text.color: {{colors.on_surface.default.hex}}
menu.items.active.bg.color: {{colors.primary_container.default.hex}}
menu.items.active.text.color: {{colors.on_primary_container.default.hex}}
menu.separator.color: {{colors.outline_variant.default.hex}}
menu.title.bg.color: {{colors.surface_container_high.default.hex}}
menu.title.text.color: {{colors.on_surface.default.hex}}

# Keep Labwc's workspace popup visually close to Noctalia surfaces. Labwc
# cannot round this OSD, so use a compact translucent card and slim markers.
osd.bg.color: {{colors.surface.default.hex}}e6
osd.border.color: {{colors.primary.default.hex}}73
osd.border.width: 1
osd.label.text.color: {{colors.on_surface.default.hex}}
osd.workspace-switcher.boxes.width: 28
osd.workspace-switcher.boxes.height: 6
osd.workspace-switcher.boxes.border.width: 1
osd.window-switcher.preview.border.color: {{colors.primary.default.hex}}
